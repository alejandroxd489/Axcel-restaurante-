<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Comida</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

<header>
<h1>🍔 App Comida</h1>
<p>Alumno: Axcel Alejandro Cruz Vidal</p>
</header>

<nav>
<button onclick="mostrarSeccion('inicio')">🏠 Inicio</button>
<button onclick="mostrarSeccion('menu')">🍔 Menú</button>
</nav>

<!-- INICIO -->
<section id="inicio" class="seccion">
<h2>Bienvenido</h2>
<p>Explora nuestro menú y disfruta comida deliciosa</p>
<img src="img/comida.png">
</section>

<!-- MENU -->
<section id="menu" class="seccion">
<h2>Menú</h2>

<div class="card">
<img src="img/tacos.png">
<h3>🌮 Tacos</h3>
<p>$25</p>
<button onclick="comprar('Tacos',25)">Comprar</button>
</div>

<div class="card">
<img src="img/hamburguesa.png">
<h3>🍔 Hamburguesa</h3>
<p>$40</p>
<button onclick="comprar('Hamburguesa',40)">Comprar</button>
</div>

</section>

</div>

<script src="app.js"></script>

</body>
  </html>
